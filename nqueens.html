<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>N-Queens Visualizer — DAA Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/nqueens.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand"><span class="dot"></span> DAA Visualizer Suite</div>
  <div class="nav-links">
    <a href="pathfinder.html">Pathfinding</a>
    <a href="nqueens.html" class="active">N-Queens</a>
    <a href="index.html" class="nav-home-btn">🏠 Home</a>
  </div>
</nav>

<!-- Controls -->
<div class="controls" id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Board Size</span>
    <select class="select-styled" id="nSelect">
      <option value="4">4 × 4</option>
      <option value="5">5 × 5</option>
      <option value="6" selected>6 × 6</option>
      <option value="7">7 × 7</option>
      <option value="8">8 × 8</option>
      <option value="10">10 × 10</option>
      <option value="12">12 × 12</option>
    </select>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <span class="ctrl-label">Speed</span>
    <span class="ctrl-label" style="font-size:.7rem">Slow</span>
    <input type="range" class="speed-slider" id="speedSlider" min="1" max="10" value="5"/>
    <span class="ctrl-label" style="font-size:.7rem">Fast</span>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <button class="btn btn-primary" id="startBtn" style="background:hsl(280,100%,65%);border-color:hsl(280,100%,65%);color:#fff">▶ Solve</button>
    <button class="btn btn-stop" id="stopBtn" disabled>⏸ Stop</button>
    <button class="btn btn-secondary" id="stepBtn">⏭ Step</button>
    <button class="btn btn-secondary" id="prevSolBtn" disabled>◀ Prev Sol</button>
    <button class="btn btn-secondary" id="nextSolBtn" disabled>Next Sol ▶</button>
    <button class="btn btn-danger" id="resetBtn">↺ Reset</button>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <label style="font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;cursor:pointer">
      <input type="checkbox" id="showConflicts" checked style="accent-color:hsl(280,100%,65%)"/> Show Conflicts
    </label>
    <label style="font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;cursor:pointer">
      <input type="checkbox" id="showAttacks" checked style="accent-color:hsl(280,100%,65%)"/> Show Attack Lines
    </label>
  </div>
</div>

<!-- Complexity Row -->
<div class="complexity-bar">
  <div class="complexity-item">
    <span class="ctrl-label">Algorithm:</span>
    <span class="value val-purple">Backtracking</span>
  </div>
  <div class="complexity-item">
    <span class="label">Time:</span>
    <span class="value val-purple" id="timeComp">O(N!)</span>
  </div>
  <div class="complexity-item">
    <span class="label">Space:</span>
    <span class="value val-cyan">O(N)</span>
  </div>
  <div class="complexity-item">
    <span class="label">Solutions:</span>
    <span class="value val-green" id="totalSols">—</span>
  </div>
  <div style="flex:1"></div>
  <div class="stat-badge"><span class="num" id="stepsCount">0</span><span class="unit">steps</span></div>
  <div class="stat-badge"><span class="num" id="backtrackCount">0</span><span class="unit">backtracks</span></div>
  <div class="stat-badge"><span class="num" id="solIdx">—</span><span class="unit">of</span></div>
  <div class="stat-badge"><span class="num" id="solTotal">—</span><span class="unit">solutions</span></div>
</div>

<!-- Main content -->
<div class="nq-main">
  <!-- Board -->
  <div class="board-wrapper">
    <div id="board"></div>
  </div>
  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-title">♛ Solutions Gallery</div>
    <div id="solutionGallery" class="solution-gallery">
      <div class="empty-gallery">Run the solver to<br/>see all solutions here</div>
    </div>
    <div class="panel-sep"></div>
    <div class="panel-title" style="margin-top:.5rem">📊 Call Stack</div>
    <div id="callStack" class="call-stack">
      <div class="cs-empty">Stack will show during solving</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/nqueens.js"></script>
</body>
</html>
